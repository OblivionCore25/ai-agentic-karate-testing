services:
  postgres:
    image: postgres:16-alpine
    container_name: karate-orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: karate
      POSTGRES_PASSWORD: karate_pass
    ports:
      - "5434:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karate -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
